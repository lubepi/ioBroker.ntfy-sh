<html>

<head>

  <!-- Load ioBroker scripts and styles-->
  <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
  <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

  <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
  <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

  <script type="text/javascript" src="../../js/translate.js"></script>
  <script type="text/javascript" src="../../lib/js/materialize.js"></script>
  <script type="text/javascript" src="../../js/adapter-settings.js"></script>

  <!-- Load our own files -->
  <link rel="stylesheet" type="text/css" href="style.css" />
  <script type="text/javascript" src="words.js"></script>

  <script type="text/javascript">
    // This will be called by the admin adapter when the settings page loads
    function load(settings, onChange) {
      // example: select elements with id=key and class=value and insert value
      if (!settings) return;
      $('.value').each(function () {
        var $key = $(this);
        var id = $key.attr('id');
        if ($key.attr('type') === 'checkbox') {
          // do not call onChange direct, because onChange could expect some arguments
          $key.prop('checked', settings[id])
            .on('change', () => onChange());
        } else {
          // do not call onChange direct, because onChange could expect some arguments
          $key.val(settings[id])
            .on('change', () => onChange())
            .on('keyup', () => onChange());
        }
      });

      function showHideSettings() {
        var authType = $('#authType').val();
        if (authType === 'basic') {
          $('.basic-auth').show();
          $('.token-auth').hide();
        } else if (authType === 'token') {
          $('.basic-auth').hide();
          $('.token-auth').show();
        } else {
          $('.basic-auth').hide();
          $('.token-auth').hide();
        }
      }

      $('#authType').on('change', function () {
        showHideSettings();
      });

      showHideSettings();

      onChange(false);
      // reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
      if (M) M.updateTextFields();
    }

    // This will be called by the admin adapter when the user presses the save button
    function save(callback) {
      // example: select elements with class=value and build settings object
      var obj = {};
      $('.value').each(function () {
        var $this = $(this);
        if ($this.attr('type') === 'checkbox') {
          obj[$this.attr('id')] = $this.prop('checked');
        } else {
          obj[$this.attr('id')] = $this.val();
        }
      });
      callback(obj);
    }
  </script>

</head>

<body>
  <div class="m adapter-container">
    <div class="row">
      <div class="col s12 m4 l2">
        <img src="ntfy.png" class="logo">
      </div>
    </div>
    
    <!-- Config Options -->
    <div class="row">
      <div class="col s12 input-field">
        <input type="text" class="value" id="url" />
        <label for="url" class="translate">Server URL</label>
      </div>
    </div>
    
    <div class="row">
      <div class="col s12 input-field">
        <select class="value" id="authType">
          <option value="none" class="translate">None</option>
          <option value="basic" class="translate">Basic Auth</option>
          <option value="token" class="translate">Access Token</option>
        </select>
        <label for="authType" class="translate">Authentication Type</label>
      </div>
    </div>
    
    <div class="row basic-auth" style="display: none;">
      <div class="col s6 input-field">
        <input type="text" class="value" id="user" />
        <label for="user" class="translate">Username</label>
      </div>
      <div class="col s6 input-field">
        <input type="password" class="value" id="pass" />
        <label for="pass" class="translate">Password</label>
      </div>
    </div>

    <div class="row token-auth" style="display: none;">
      <div class="col s12 input-field">
        <input type="password" class="value" id="token" />
        <label for="token" class="translate">Access Token</label>
      </div>
    </div>
  </div>
</body>

</html>
